# drush site aliases

ddev:
  root: /var/www/html/web
  uri: http://doesdesign.ddev.site
  paths:
    config-sync: '/var/www/html/config/sync'
  db:
    driver: mysql
    database: db
    username: db
    password: db
    host: db
    port: 3306

d7:
  root: /var/www/html/web
  uri: http://doesdesign.ddev.site
  db:
    driver: mysql
    database: db
    username: db
    password: db
    host: ddev-doesdesign7-db
    port: 3306

live:
  host: ${env.REMOTE_HOST}
  user: ${env.REMOTE_USER}
  ssh:
    options: ${env.SSH_OPTIONS}
  root: ${env.REMOTE_PROJECT_DIR}/production/web
  uri: ${env.LIVE_URI}
  paths:
    drush-script: ${env.REMOTE_PROJECT_DIR}/production/bin/drush

stage:
  host: ${env.REMOTE_HOST}
  user: ${env.REMOTE_USER}
  ssh:
    options: ${env.SSH_OPTIONS}
  root: ${env.REMOTE_PROJECT_DIR}/stage/web
  uri: ${env.STAGE_URI}
  paths:
    drush-script: ${env.REMOTE_PROJECT_DIR}/stage/bin/drush
  db:
    driver: mysql
    database: db
    username: db
    password: db
    host: ddev-doesdesign7-db
    port: 3306
