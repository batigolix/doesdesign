          - generic [ref=e143]:
            - text: .
            - heading "Hoogwaardige trouwringen en sieraden met Japanse smeedtechniek." [level=2] [ref=e144]
            - generic [ref=e145]:
              - paragraph [ref=e146]:
                - text: Welkom bij Smederij Doesdesign. Edelsmid, goudsmid en zilversmid
                - link "Birgit Doesborg" [ref=e147] [cursor=pointer]:
                  - /url: /pagina/goudsmid-zilversmid-birgit-doesborg
                - text: ", ontwerpt"
                - link "unieke sieraden" [ref=e148] [cursor=pointer]:
                  - /url: https://doesdesign.nl/gemaakt-in/2022
                - text: ","
                - link "repareert sieraden" [ref=e149] [cursor=pointer]:
                  - /url: https://doesdesign.nl/pagina/restaureren-sieraden-en-objecten
                - text: en
                - link "objecten" [ref=e150] [cursor=pointer]:
                  - /url: https://doesdesign.nl/soort-sieraden/originele-hand-gesmede-sierobjecten
                - text: en steekt veel tijd in een hoogwaardige product. Birgit is meester in Mokume-gane en ontwerpt met deze oud japanse smeedtechniek unieke sieraden en trouwringen vakkundig met passie en emotie in haar eigen atelier 'Het Vooronder" in het
                - link "Werkwarenhuis" [ref=e151] [cursor=pointer]:
                  - /url: https://werkwarenhuis.nl/our-story/
                - text: op de
                - link "Tramkade" [ref=e152] [cursor=pointer]:
                  - /url: https://www.denbosch.nl/nl/projecten/spoorzone/de-tramkade
                - text: ", een creatieve broedplaats te s-Hertogenbosch."
              - paragraph [ref=e153]:
                - text: In haar vakmanschap beoefent zij als een van de weinige edelsmeden in Nederland een arbeidsintensieve techniek
                - link "\"Mokume-gane\"" [ref=e154] [cursor=pointer]:
                  - /url: /pagina/over-mokume-gane
                - text: waarbij lagen van verschillende edelmetalen aan elkaar worden gesmeed, dit is tevens haar specialiteit, een oud Japanse smeedtechniek die afstamt van de Samoerai zwaarden. Kwaliteit, uniek design en een eigen identiteit, dat is waar Doesdesign voor staat.
              - paragraph [ref=e155]:
                - text: Met deze techniek ontstaan organische lijnen en patronen in het edelmetaal dat de basis legt voor haar
                - link "unieke en originele trouwringen" [ref=e156] [cursor=pointer]:
                  - /url: http://doesdesign.nl/pagina/originele-en-unieke-trouwringen-van-mokume-gane
                - text: en
                - link "bijzondere sieraden" [ref=e157] [cursor=pointer]:
                  - /url: /soort-sieraden/bijzondere-en-originele-colliers-hangers-broches-van-mokume-gane
                - text: en
                - link "objecten" [ref=e158] [cursor=pointer]:
                  - /url: /soort-sieraden/originele-hand-gesmede-sierobjecten
                - text: .
              - paragraph [ref=e159]: LET OP ! Prijs op de site is afhankelijk van het gebruikte edelmetalen en dagkoers indicatie .
              - paragraph [ref=e160]
              - paragraph [ref=e161]: Meester bij het Nederlands gilde van goudsmeden
              - paragraph [ref=e162]:
                - text: Birgit Doesborg is sinds 2010 lid van het
                - link "Nederlands gilde van goudsmeden" [ref=e163] [cursor=pointer]:
                  - /url: http://www.meestergoudsmeden.nl/
                - text: en werkt alleen in opdracht, zij hecht waarde aan een persoonlijk contact met de klant.
