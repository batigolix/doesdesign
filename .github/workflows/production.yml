name: Build & deploy production
on:
  push:
    branches:
      - 'master'
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy using SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          port: 7822
          debug: true
          script: |
            set -euo pipefail
            cd ${{ secrets.PRODUCTION_DIR }}
            chmod a+w web/sites/default
            chmod a+w web/sites/default/settings.php
            git reset --hard
            git checkout master
            git pull origin master
            ${{ secrets.COMPOSER }} install --no-dev --ignore-platform-reqs
            ln -sfn ../../../../files web/sites/default/files
            chmod a-w web/sites/default
            chmod a-w web/sites/default/settings.php
            bin/drush --uri=https://doesdesign.nl deploy
            bin/drush --uri=https://doesdesign.nl st
